<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Weather - Monet Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(180deg, #d4e4f7 0%, #f5e6d3 50%, #e8d5c4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            color: #2c1810;
            animation: fadeInDown 1.5s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #5a4a3a;
            font-style: italic;
        }
        
        .weather-info {
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 15px;
            margin: 20px auto;
            max-width: 600px;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out 0.5s both;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .temperature {
            font-size: 4.5rem;
            color: #3d5a80;
            font-weight: 300;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .condition {
            font-size: 1.5rem;
            color: #5a4a3a;
            margin-top: 10px;
        }
        
        #monetCanvas {
            width: 100%;
            height: 650px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin: 20px 0;
            animation: canvasAppear 2s ease-out 1s both;
        }
        
        @keyframes canvasAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #5a4a3a;
            font-style: italic;
            animation: fadeIn 1s ease-out 2s both;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .temperature { font-size: 3.5rem; }
            #monetCanvas { height: 450px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Boston Weather</h1>
            <p class="subtitle">à la manière de Claude Monet</p>
        </header>
        
        <div class="weather-info">
            <div class="temperature" id="temperature">--</div>
            <div class="condition" id="condition">Loading weather...</div>
            <p style="margin-top: 15px; color: #5a4a3a;">Boston, Massachusetts • Charles River</p>
        </div>
        
        <canvas id="monetCanvas"></canvas>
        
        <footer>
            <p>Impressionist renderings inspired by Claude Monet's Water Lilies and Haystacks series</p>
            <p>Each brushstroke captures the fleeting light and atmosphere of Boston's ever-changing weather</p>
        </footer>
    </div>

    <script>
        // Monet-style color palettes
        const monetPalettes = {
            winter: ['#85C1E9', '#AED6F1', '#D6EAF8', '#FFFFFF', '#E8F8F5', '#D4E6F1', '#F0F3F4', '#B0E0E6'],
            misty: ['#BDC3C7', '#95A5A6', '#7F8C8D', '#BDC3C7', '#ECF0F1', '#AAB7B8', '#D5DBDB', '#C0C0C0']
        };

        // Animation state
        let particles = [];
        let figures = [];
        let time = 0;
        let weatherData = {
            temp: 47,
            condition: 'Cloudy',
            wind: 4
        };

        // Fetch weather from wttr.in
        async function fetchWeather() {
            try {
                const response = await fetch('https://wttr.in/Boston?format=j1');
                const data = await response.json();
                
                // Extract current weather from JSON response
                const current = data.current_condition[0];
                const temp = parseInt(current.temp_F);
                const weatherDesc = current.weatherDesc[0].value;
                
                // Clean up the description
                const safeCondition = weatherDesc.replace(/[^\w\s]/gi, '').trim();
                
                weatherData.temp = temp;
                weatherData.condition = safeCondition;
                
                // Update UI
                document.getElementById('temperature').textContent = `${temp}°F`;
                document.getElementById('condition').textContent = getConditionText(safeCondition);
            } catch (error) {
                console.log('Using default weather data:', error);
                // Set default values on error
                document.getElementById('temperature').textContent = '47°F';
                document.getElementById('condition').textContent = 'Cloudy';
            }
        }
        
        function getConditionText(code) {
            const conditions = {
                'Cloudy': 'Cloudy',
                'Sunny': 'Sunny',
                'Rain': 'Rain',
                'Snow': 'Snow',
                'Mist': 'Misty',
                'Fog': 'Foggy',
                'Clear': 'Clear Sky',
                'Partly': 'Partly Cloudy',
                'Overcast': 'Overcast',
                'body': '', // Remove this if it appears
                'html': '' // Remove this if it appears
            };
            // Handle edge cases
            if (!code) return 'Cloudy';
            if (code.includes('body') || code.includes('html')) return 'Cloudy';
            return conditions[code] || code || 'Cloudy';
        }

        // Particle class for mist/fog
        class MistParticle {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = 30 + Math.random() * 60;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.opacity = 0.02 + Math.random() * 0.04;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < -100 || this.x > this.canvas.width + 100 ||
                    this.y < -100 || this.y > this.canvas.height + 100) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#BDC3C7';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Animated figure class
        class AnimatedFigure {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.startX = x;
                this.size = size;
                this.color = color;
                this.phase = Math.random() * Math.PI * 2;
                this.hasUmbrella = Math.random() > 0.3;
            }
            
            update() {
                this.phase += 0.015;
                this.x = this.startX + Math.sin(this.phase) * 15;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = 0.85;
                
                // Body
                const breathe = 1 + Math.sin(this.phase * 0.5) * 0.03;
                for (let i = 0; i < 8; i++) {
                    const offsetX = (Math.random() - 0.5) * this.size * 0.4 * breathe;
                    const offsetY = (Math.random() - 0.5) * this.size * 0.8;
                    
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.ellipse(this.x + offsetX, this.y + offsetY, this.size * 0.12, this.size * 0.06, 
                               Math.random() * Math.PI, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Head
                ctx.beginPath();
                ctx.arc(this.x, this.y - this.size * 0.4, this.size * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = '#F5DEB3';
                ctx.globalAlpha = 0.95;
                ctx.fill();
                
                // Hat
                ctx.beginPath();
                ctx.ellipse(this.x, this.y - this.size * 0.5, this.size * 0.2, this.size * 0.08, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#2C1810';
                ctx.globalAlpha = 0.7;
                ctx.fill();
                
                // Umbrella
                if (this.hasUmbrella) {
                    ctx.globalAlpha = 0.65;
                    ctx.fillStyle = '#C0392B';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y - this.size * 0.6, this.size * 0.5, Math.PI, 0);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#2C1810';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.size * 0.6);
                    ctx.lineTo(this.x, this.y - this.size * 0.2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        // Impressionist brush stroke
        function drawImpressionistStroke(ctx, x, y, color, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.6 + Math.sin(time * 0.01) * 0.1;
            
            for (let i = 0; i < 5; i++) {
                const offsetX = (Math.random() - 0.5) * size * 2;
                const offsetY = (Math.random() - 0.5) * size * 2;
                const dabSize = size * (0.5 + Math.random() * 0.5);
                
                ctx.beginPath();
                ctx.ellipse(offsetX, offsetY, dabSize, dabSize * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // Draw Monet-style sky with animated clouds
        function drawMonetSky(ctx, width, height) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.6);
            gradient.addColorStop(0, '#5D6D7E');
            gradient.addColorStop(0.3, '#85C1E9');
            gradient.addColorStop(0.6, '#AED6F1');
            gradient.addColorStop(1, '#D6EAF8');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height * 0.6);
            
            // Animated clouds
            for (let i = 0; i < 10; i++) {
                const cloudX = ((i * 140 + time * 0.3) % (width + 200)) - 100;
                const cloudY = 25 + i * 22;
                const color = monetPalettes.misty[i % monetPalettes.misty.length];
                
                for (let j = 0; j < 12; j++) {
                    const x = cloudX + (Math.random() - 0.5) * 70;
                    const y = cloudY + (Math.random() - 0.5) * 18;
                    drawImpressionistStroke(ctx, x, y, color, 7 + Math.random() * 5, Math.random() * Math.PI);
                }
            }
        }

        // Draw animated water
        function drawMonetWater(ctx, width, height, startY) {
            const gradient = ctx.createLinearGradient(0, startY, 0, height);
            gradient.addColorStop(0, '#4A5A6A');
            gradient.addColorStop(0.5, '#5DAFC2');
            gradient.addColorStop(1, '#7EC8E3');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, startY, width, height - startY);
            
            // Animated ripples
            for (let i = 0; i < 70; i++) {
                const x = (i * 43 + time * 0.25) % width;
                const y = startY + 20 + (i * 15) % (height - startY - 40);
                const palette = monetPalettes.winter;
                const color = palette[i % palette.length];
                
                const shimmer = Math.sin(time * 0.05 + i * 0.5) * 0.3 + 0.7;
                ctx.globalAlpha = 0.5 * shimmer;
                drawImpressionistStroke(ctx, x, y, color, 5 + Math.random() * 5, 
                                       Math.sin(time * 0.02 + i) * Math.PI);
            }
            
            // Animated lily pads
            for (let i = 0; i < 5; i++) {
                const x = width * (0.15 + i * 0.18);
                const y = startY + 50 + Math.sin(time * 0.02 + i * 0.5) * 8;
                drawLilyPad(ctx, x, y);
            }
        }

        function drawLilyPad(ctx, x, y) {
            ctx.save();
            ctx.globalAlpha = 0.8;
            
            // Lily pad
            ctx.fillStyle = '#27AE60';
            ctx.beginPath();
            ctx.ellipse(x, y, 20, 12, Math.sin(time * 0.01) * 0.1, 0, Math.PI * 2);
            ctx.fill();
            
            // Lotus flower
            ctx.fillStyle = '#FFB6C1';
            for (let i = 0; i < 6; i++) {
                const petalAngle = i * Math.PI * 2 / 6 + time * 0.005;
                ctx.beginPath();
                ctx.ellipse(x + Math.cos(petalAngle) * 5, 
                           y + Math.sin(petalAngle) * 5, 
                           5, 2.5, petalAngle, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // Draw animated trees
        function drawMonetTree(ctx, x, y, size, palette) {
            // Trunk
            ctx.fillStyle = '#5D4037';
            ctx.globalAlpha = 0.85;
            ctx.fillRect(x - 3, y, 6, size * 0.4);
            
            // Bare winter branches with subtle sway
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 5; i++) {
                const branchAngle = -Math.PI / 4 + (i * Math.PI / 8);
                const sway = Math.sin(time * 0.02 + i) * 0.05;
                ctx.beginPath();
                ctx.moveTo(x, y - size * 0.3);
                ctx.lineTo(x + Math.cos(branchAngle + sway) * size * 0.4, 
                          y - size * 0.3 + Math.sin(branchAngle + sway) * size * 0.3);
                ctx.stroke();
            }
            
            // Sparse winter foliage
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * size * 0.35;
                const sway = Math.sin(time * 0.03 + i * 0.1) * 2;
                const folX = x + Math.cos(angle) * distance + sway;
                const folY = y - size * 0.15 + Math.sin(angle) * distance * 0.5;
                const color = palette[Math.floor(Math.random() * palette.length)];
                
                drawImpressionistStroke(ctx, folX, folY, color, 4 + Math.random() * 5, angle);
            }
        }

        // Draw buildings
        function drawMonetBuilding(ctx, x, y, width, height, color) {
            ctx.save();
            ctx.globalAlpha = 0.75;
            
            // Building structure
            for (let i = 0; i < 20; i++) {
                const bx = x + (Math.random() - 0.5) * width;
                const by = y + (Math.random() - 0.5) * height;
                drawImpressionistStroke(ctx, bx, by, color, 4, 0);
            }
            
            // Windows with warm light
            const windowLight = Math.sin(time * 0.02) * 0.15 + 0.6;
            ctx.fillStyle = `rgba(255, 248, 220, ${windowLight})`;
            for (let wx = x - width * 0.3; wx <= x + width * 0.3; wx += width * 0.2) {
                for (let wy = y - height * 0.3; wy <= y + height * 0.2; wy += height * 0.2) {
                    ctx.globalAlpha = 0.5 + Math.random() * 0.3;
                    ctx.fillRect(wx - 3, wy - 5, 6, 10);
                }
            }
            
            ctx.restore();
        }

        // Main drawing function - Winter Boston scene
        function drawScene() {
            const canvas = document.getElementById('monetCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            // Winter sky
            drawMonetSky(ctx, width, height);
            
            // Charles River
            drawMonetWater(ctx, width, height, height * 0.5);
            
            // Snow-covered ground
            const groundGradient = ctx.createLinearGradient(0, height * 0.6, 0, height);
            groundGradient.addColorStop(0, '#E8F8F5');
            groundGradient.addColorStop(1, '#D4E6F1');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, height * 0.6, width, height * 0.4);
            
            // Winter trees
            for (let i = 0; i < 6; i++) {
                const tx = width * (0.1 + i * 0.16);
                drawMonetTree(ctx, tx, height * 0.65, 55, monetPalettes.winter);
            }
            
            // Boston skyline
            for (let i = 0; i < 4; i++) {
                const bx = width * 0.15 + i * width * 0.2;
                const by = height * 0.42;
                const bHeight = 45 + Math.random() * 55;
                drawMonetBuilding(ctx, bx, by, 40 + Math.random() * 20, bHeight, '#7F8C8D');
            }
            
            // Draw and update figures
            figures.forEach(figure => {
                figure.update();
                figure.draw(ctx);
            });
            
            // Draw and update rain
            particles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
            
            // Update time
            time++;
            
            // Continue animation
            requestAnimationFrame(drawScene);
        }

        // Initialize
        window.addEventListener('load', async () => {
            const canvas = document.getElementById('monetCanvas');
            
            // Fetch weather data
            await fetchWeather();
            
            // Create mist/fog particles for cloudy weather
            for (let i = 0; i < 25; i++) {
                particles.push(new MistParticle(canvas));
            }
            
            // Create figures
            const figureColors = ['#2C3E50', '#8B4513', '#4682B4', '#556B2F', '#6B4423', '#4A4A4A', '#34495E'];
            for (let i = 0; i < 5; i++) {
                const fx = canvas.offsetWidth * (0.15 + i * 0.175);
                const fy = canvas.offsetHeight * (0.68 + Math.random() * 0.2);
                const color = figureColors[Math.floor(Math.random() * figureColors.length)];
                figures.push(new AnimatedFigure(fx, fy, 42 + Math.random() * 12, color));
            }
            
            // Start animation
            drawScene();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            particles = [];
            figures = [];
            
            const canvas = document.getElementById('monetCanvas');
            
            // Recreate mist/fog particles
            for (let i = 0; i < 25; i++) {
                particles.push(new MistParticle(canvas));
            }
            
            // Recreate figures
            const figureColors = ['#2C3E50', '#8B4513', '#4682B4', '#556B2F', '#6B4423', '#4A4A4A', '#34495E'];
            for (let i = 0; i < 5; i++) {
                const fx = canvas.offsetWidth * (0.15 + i * 0.175);
                const fy = canvas.offsetHeight * (0.68 + Math.random() * 0.2);
                const color = figureColors[Math.floor(Math.random() * figureColors.length)];
                figures.push(new AnimatedFigure(fx, fy, 42 + Math.random() * 12, color));
            }
        });
    </script>
</body>
</html>
